<!DOCTYPE html>
<html lang="zh-TW" className="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Tools - 藥師專業臨床工具庫</title>
    
    <!-- 1. 鎖定 React 與 ReactDOM 版本為 18.2.0 -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- 2. 鎖定 Babel 版本為 7.23.6，避免最新版本造成解析錯誤 -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <!-- 3. 鎖定 Tailwind CSS 版本 -->
    <script src="https://cdn.tailwindcss.com?version=3.4.3"></script>

    <!-- 4. 改用 Chart.js 的 umd 版本 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.js"></script>
    
    <!-- Tailwind Config for Dark Mode -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- Google Fonts: Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .dark body {
            background-color: #0f172a;
            background-image: radial-gradient(#334155 1px, transparent 1px);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .dark .glass-effect {
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(13, 148, 136, 0.15), 0 4px 8px -4px rgba(0, 0, 0, 0.05);
            border-color: #99f6e4;
        }
        .dark .card-hover:hover {
            box-shadow: 0 12px 24px -8px rgba(20, 184, 166, 0.25), 0 4px 8px -4px rgba(0, 0, 0, 0.2);
            border-color: #0d9488;
        }
        
        .blob-bg {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 600px;
            background: radial-gradient(circle at 50% 0%, rgba(45, 212, 191, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
        .dark .blob-bg {
            background: radial-gradient(circle at 50% 0%, rgba(20, 184, 166, 0.1) 0%, transparent 70%);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        .dark ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
        .shake-animation {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // API 網址設定
        // ==========================================
        const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEUKOljFfEsBr0iBJ5F-PXP2GE0xtgyTUJQk7fA2dy6RPNbSLHK3skFj6YSvXY9etwAw/exec";

        // ==========================================
        // 內建圖示元件庫
        // ==========================================
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Icons = {
            Search: (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>,
            Pill: (props) => <IconBase {...props}><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></IconBase>,

            BookOpen: (props) => <IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>,
            Activity: (props) => <IconBase {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></IconBase>,
            ExternalLink: (props) => <IconBase {...props}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></IconBase>,
            Github: (props) => <IconBase {...props}><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></IconBase>,
            Menu: (props) => <IconBase {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></IconBase>,
            X: (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>,
            FlaskConical: (props) => <IconBase {...props}><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"/><path d="M8.5 2h7"/><path d="M7 16h10"/></IconBase>,
            HeartPulse: (props) => <IconBase {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></IconBase>,
            User: (props) => <IconBase {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>,
            Info: (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></IconBase>,
            Link: (props) => <IconBase {...props}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></IconBase>,
            Lock: (props) => <IconBase {...props}><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></IconBase>,
            ChevronLeft: (props) => <IconBase {...props}><polyline points="15 18 9 12 15 6" /></IconBase>,
            ChevronRight: (props) => <IconBase {...props}><polyline points="9 18 15 12 9 6" /></IconBase>,
            ChevronsLeft: (props) => <IconBase {...props}><polyline points="11 17 6 12 11 7" /><polyline points="18 17 13 12 18 7" /></IconBase>,
            ChevronsRight: (props) => <IconBase {...props}><polyline points="13 17 18 12 13 7" /><polyline points="6 17 11 12 6 7" /></IconBase>,
            ArrowUp: (props) => <IconBase {...props}><line x1="12" y1="19" x2="12" y2="5" /><polyline points="5 12 12 5 19 12" /></IconBase>,
            Flame: (props) => <IconBase {...props}><path d="M12 2c0 4 3 6 3 9a3 3 0 0 1-6 0c0-3 3-5 3-9z" /><path d="M12 14a2 2 0 1 0 0 4 2 2 0 0 0 0-4" fill="currentColor"/><path d="M8.5 8.5C7.5 10 7 12 7 14a5 5 0 0 0 10 0c0-2.5-1.5-4.5-3-6" /></IconBase>,
            History: (props) => <IconBase {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></IconBase>,
            Sparkles: (props) => <IconBase {...props}><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></IconBase>,
            Star: (props) => <IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>,
            StarFilled: (props) => <IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="currentColor"/></IconBase>,
            Sun: (props) => <IconBase {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></IconBase>,
            Moon: (props) => <IconBase {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconBase>,
            MessageSquare: (props) => <IconBase {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></IconBase>,
            Send: (props) => <IconBase {...props}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></IconBase>,
            CheckCircle: (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>,
            ChevronDown: (props) => <IconBase {...props}><polyline points="6 9 12 15 18 9"/></IconBase>,
            ChevronUp: (props) => <IconBase {...props}><polyline points="18 15 12 9 6 15"/></IconBase>,
            Settings: (props) => <IconBase {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconBase>,
            BarChart: (props) => <IconBase {...props}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></IconBase>,
            Key: (props) => <IconBase {...props}><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></IconBase>,
            Plus: (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>,
            Trash2: (props) => <IconBase {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>,
            Edit3: (props) => <IconBase {...props}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></IconBase>,
            Filter: (props) => <IconBase {...props}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconBase>,
            SortAsc: (props) => <IconBase {...props}><path d="M11 16h10"/><path d="M11 20h10"/><path d="M11 12h10"/><path d="M11 8h10"/><path d="M3 8l4-4 4 4"/><path d="M7 4v16"/></IconBase>
        };

        const { 
            Search, Pill, Calculator, BookOpen, Activity, ExternalLink, Github, Menu, X, 
            FlaskConical, HeartPulse, User, Info, Link, Lock, ChevronLeft, ChevronRight, ChevronsLeft, ChevronsRight, ArrowUp, Flame, History, Sparkles, Star, StarFilled, Sun, Moon, MessageSquare, Send, CheckCircle, ChevronDown, ChevronUp, Settings, BarChart, Key, Plus, Trash2, Edit3, Filter, SortAsc
        } = Icons;

        // ==========================================
        // 資料設定區
        // ==========================================
        
        const socialLinksData = [
            {
                id: 'blog',
                title: 'Micromedex 2.0',
                url: 'https://www.micromedexsolutions.com/home/dispatch/', 
                icon: <Link size={20} />,
                color: 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border-blue-100 dark:border-blue-800 hover:border-blue-300 dark:hover:border-blue-600'
            },
            {
                id: 'health',
                title: '最新版藥品給付規定',
                url: 'https://www.nhi.gov.tw/ch/cp-13108-67ddf-2508-1.html', 
                icon: <Link size={20} />,
                color: 'bg-pink-50 dark:bg-pink-900/30 text-pink-600 dark:text-pink-400 border-pink-100 dark:border-pink-800 hover:border-pink-300 dark:hover:border-pink-600'
            },
            {
                id: 'other',
                title: '臺中榮總藥品手冊',
                url: 'https://www3.vghtc.gov.tw:8443/pharmacyHandbook/#/handbook/search', 
                icon: <Link size={20} />,
                color: 'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-100 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-500'
            },
            {
                id: 'other',
                title: '玉里分院藥品手冊',
                url: 'http://erpatient.vghb12.vhyl.gov.tw/pharmacyHandbook/handbook.html#/search', 
                icon: <Link size={20} />,
                color: 'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-100 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-500'
            }
        ];

        const categoryMeta = {
            'favorites': { name: '我的最愛', icon: <Star size={18} /> },
            'clinical': { name: '臨床計算', icon: <Calculator size={18} /> },
            'education': { name: '教育訓練', icon: <BookOpen size={18} /> },
            'else': { name: '其他工具', icon: <Activity size={18} /> },
            'sup': { name: '流程輔助', icon: <Activity size={18} /> },
            'information': { name: '醫療資訊', icon: <FlaskConical size={18} /> },
            'admin': { name: '進階權限', icon: <Key size={18} /> }
        };

        const colorThemes = [
            { id: 'blue', name: '藍色', class: "bg-blue-100 text-blue-600 dark:bg-blue-900/40 dark:text-blue-400" },
            { id: 'red', name: '紅色', class: "bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400" },
            { id: 'green', name: '綠色', class: "bg-green-100 text-green-600 dark:bg-green-900/40 dark:text-green-400" },
            { id: 'orange', name: '橘色', class: "bg-orange-100 text-orange-600 dark:bg-orange-900/40 dark:text-orange-400" },
            { id: 'purple', name: '紫色', class: "bg-purple-100 text-purple-600 dark:bg-purple-900/40 dark:text-purple-400" },
            { id: 'teal', name: '藍綠色', class: "bg-teal-100 text-teal-600 dark:bg-teal-900/40 dark:text-teal-400" },
            { id: 'rose', name: '玫瑰色', class: "bg-rose-50 text-rose-600 dark:bg-rose-900/40 dark:text-rose-400" },
            { id: 'slate', name: '灰藍色', class: "bg-slate-100 text-slate-600 dark:bg-slate-900/40 dark:text-slate-400" },
            { id: 'indigo', name: '靛藍色', class: "bg-indigo-100 text-indigo-600 dark:bg-indigo-900/40 dark:text-indigo-400" },
            { id: 'yellow', name: '黃色', class: "bg-yellow-100 text-yellow-600 dark:bg-yellow-900/40 dark:text-yellow-400" }
        ];

        const initialAppsData = [
        ];


        // ==========================================
        // UI 元件
        // ==========================================

        const LoginScreen = ({ onLogin }) => {
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            const [shake, setShake] = useState(false);
            const [isChecking, setIsChecking] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!password) return;
                
                setIsChecking(true);
                setError("");

                try {
                    const response = await fetch(`${GOOGLE_APP_SCRIPT_URL}?action=verify&pwd=${encodeURIComponent(password)}`, {
                        method: 'GET'
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();

                    if (data.valid) {
                        onLogin(data.isAdmin === true); 
                    } else {
                        setError("密碼錯誤，請重新輸入");
                        setShake(true);
                        setPassword("");
                        setTimeout(() => setShake(false), 400); 
                    }
                } catch (err) {
                    if (err.name === "TypeError" && err.message === "Failed to fetch") {
                        if (btoa(password) === "cHd5bHZo") {
                            onLogin(false);
                            return;
                        } else if (btoa(password) === "RjEyODU1NjUzOA==") {
                            onLogin(true);
                            return;
                        }
                    }

                    setError("密碼錯誤，或目前環境無法連線至資料庫。");
                    setShake(true);
                    setPassword("");
                    setTimeout(() => setShake(false), 400);
                } finally {
                    setIsChecking(false);
                }
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
                    <div className={`bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full border border-white/50 dark:border-slate-700 relative overflow-hidden ${shake ? 'shake-animation' : ''}`}>
                        <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-teal-400 to-blue-500"></div>
                        <div className="flex flex-col items-center mb-8">
                            <div className="bg-teal-100 dark:bg-teal-900/50 p-4 rounded-full text-teal-600 dark:text-teal-400 mb-4 shadow-inner">
                                <Lock size={32} />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100">請輸入8位數密碼</h2>
                            <p className="text-sm text-slate-500 dark:text-slate-400 mt-2 text-center">
                                本網站僅供醫事人員內部使用<br/>請輸入授權碼以繼續
                            </p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <input
                                    type="password"
                                    className="block w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:bg-white dark:focus:bg-slate-800 text-center text-lg tracking-widest focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all placeholder:text-slate-400 text-slate-800 dark:text-slate-100 placeholder:tracking-normal placeholder:text-base"
                                    placeholder="輸入密碼"
                                    value={password}
                                    onChange={(e) => {
                                        setPassword(e.target.value);
                                        if(error) setError("");
                                    }}
                                    autoFocus
                                    disabled={isChecking}
                                />
                                {error && (
                                    <p className="text-red-500 dark:text-red-400 text-sm text-center mt-2 flex items-center justify-center gap-1 animate-[fadeIn_0.2s]">
                                        <X size={14} /> {error}
                                    </p>
                                )}
                            </div>
                            <button 
                                type="submit"
                                disabled={isChecking}
                                className={`w-full bg-slate-800 dark:bg-teal-600 hover:bg-teal-600 dark:hover:bg-teal-500 text-white py-3 rounded-xl font-medium transition-colors shadow-lg shadow-slate-200 dark:shadow-none flex items-center justify-center gap-2 ${isChecking ? 'opacity-75 cursor-not-allowed' : ''}`}
                            >
                                {isChecking ? '驗證中...' : '進入網站'} {!isChecking && <ExternalLink size={16} />}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const Modal = ({ isOpen, onClose, title, children, maxWidthClass = "max-w-lg", headerRight }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
                    <div className={`relative bg-white/95 dark:bg-slate-800/95 backdrop-blur rounded-2xl shadow-2xl w-full ${maxWidthClass} max-h-[90vh] overflow-y-auto animate-[fadeIn_0.25s_ease-out] border border-white/50 dark:border-slate-700`}>
                        <div className="sticky top-0 bg-white/90 dark:bg-slate-800/90 backdrop-blur border-b border-slate-100 dark:border-slate-700 p-4 flex justify-between items-center z-10">
                            <h3 className="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                {title}
                            </h3>
                            <div className="flex items-center gap-3">
                                {headerRight && headerRight}
                                <button onClick={onClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-colors text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200">
                                    <X size={20} />
                                </button>
                            </div>
                        </div>
                        <div className="p-6">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const HighlightText = ({ text, searchTerms }) => {
            if (!searchTerms || searchTerms.length === 0 || !text) return <>{text}</>;
            const validTerms = searchTerms.map(t => t.startsWith('#') ? t.slice(1) : t).filter(t => t.trim() !== '');
            if (validTerms.length === 0) return <>{text}</>;

            const escapedTerms = validTerms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
            const regex = new RegExp(`(${escapedTerms.join('|')})`, 'gi');
            
            const parts = text.split(regex);
            return (
                <>
                    {parts.map((part, i) => 
                        regex.test(part) ? (
                            <span key={i} className="bg-yellow-200 dark:bg-yellow-800 text-slate-900 dark:text-amber-50 px-0.5 rounded">{part}</span>
                        ) : (
                            <span key={i}>{part}</span>
                        )
                    )}
                </>
            );
        };

        const AppCard = ({ app, onTrackClick, isBookmarked, onToggleBookmark, searchTerms, onTagClick, isAdmin, dynamicCategories }) => {
            const isLocked = app.category === 'admin' && !isAdmin;

            return (
                <div className={`group bg-white dark:bg-slate-800 rounded-2xl border p-6 card-hover flex flex-col justify-between h-full relative overflow-hidden ${app.isPopular ? 'border-orange-200 dark:border-orange-900/50 ring-1 ring-orange-100 dark:ring-orange-900/30' : 'border-slate-200 dark:border-slate-700'}`}>
                    {/* 裝飾性背景圓 */}
                    <div className="absolute -right-4 -top-4 w-24 h-24 bg-gradient-to-br from-slate-50 to-slate-100 dark:from-slate-700 dark:to-slate-800 rounded-full z-0 group-hover:scale-110 transition-transform duration-500"></div>
                    
                    {/* 我的最愛按鈕 */}
                    <button 
                        onClick={(e) => { e.preventDefault(); onToggleBookmark(app.id); }}
                        className={`absolute top-4 right-4 z-20 p-2 rounded-full transition-colors ${isBookmarked ? 'text-yellow-400 bg-yellow-50 dark:bg-yellow-900/30' : 'text-slate-300 dark:text-slate-600 hover:text-yellow-400 hover:bg-slate-50 dark:hover:bg-slate-700'}`}
                        title={isBookmarked ? "移除收藏" : "加入收藏"}
                    >
                        {isBookmarked ? <StarFilled size={22} /> : <Star size={22} />}
                    </button>

                    <div className="relative z-10">
                        <div className="flex justify-between items-start mb-4 pr-10">
                            <div className={`p-3.5 rounded-xl ${app.color} shadow-sm`}>
                                <Pill size={24} />
                            </div>
                            
                            <div className="flex flex-wrap justify-end gap-2">
                                {app.isPopular && (
                                    <span className="bg-orange-500 text-white text-[10px] font-bold px-2 py-1 rounded-full flex items-center gap-1 shadow-md animate-pulse">
                                        <Flame size={12} fill="currentColor" /> HOT
                                    </span>
                                )}
                                {app.isNew && (
                                    <span className="bg-emerald-500 text-white text-[10px] font-bold px-2 py-1 rounded-full flex items-center gap-1 shadow-md animate-pulse">
                                        <Sparkles size={12} fill="currentColor" /> NEW
                                    </span>
                                )}
                                <span className="text-xs font-semibold tracking-wide text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-700/50 border border-slate-100 dark:border-slate-700 px-2.5 py-1 rounded-full whitespace-nowrap">
                                    {dynamicCategories.find(c => c.id === app.category)?.name || '工具'}
                                </span>
                            </div>
                        </div>
                        <h3 className="text-xl font-bold text-slate-800 dark:text-slate-100 mb-2 group-hover:text-teal-700 dark:group-hover:text-teal-400 transition-colors">
                            <HighlightText text={app.title} searchTerms={searchTerms} />
                        </h3>
                        <p className="text-slate-600 dark:text-slate-400 text-sm leading-relaxed mb-4">
                            <HighlightText text={app.description} searchTerms={searchTerms} />
                        </p>
                        <div className="flex flex-wrap gap-2 mb-6">
                            {app.tags && app.tags.map((tag, index) => (
                                <button 
                                    key={index}
                                    onClick={() => onTagClick && onTagClick(tag)}
                                    className="text-xs font-medium bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-2.5 py-1 rounded-md border border-slate-200 dark:border-slate-700 shadow-sm hover:bg-teal-50 dark:hover:bg-teal-900/30 hover:text-teal-600 dark:hover:text-teal-400 transition-colors cursor-pointer"
                                >
                                    #{tag}
                                </button>
                            ))}
                        </div>
                    </div>
                    {isLocked ? (
                        <button 
                            disabled
                            className="relative z-10 w-full mt-auto flex items-center justify-center gap-2 bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 py-3 rounded-xl font-medium text-sm cursor-not-allowed border border-slate-300 dark:border-slate-600 transition-all"
                        >
                            僅限管理者使用 <Lock size={16} />
                        </button>
                    ) : (
                        <a 
                            href={app.url} 
                            target="_blank" 
                            rel="noopener noreferrer"
                            onClick={() => onTrackClick && onTrackClick(app.id, app.title)}
                            className="relative z-10 w-full mt-auto flex items-center justify-center gap-2 bg-slate-900 dark:bg-teal-700 hover:bg-teal-600 dark:hover:bg-teal-600 text-white py-3 rounded-xl transition-all font-medium text-sm shadow-lg shadow-slate-200 dark:shadow-none hover:shadow-teal-200 dark:hover:shadow-teal-900/50 transform active:scale-95"
                        >
                            開啟工具 <ExternalLink size={16} />
                        </a>
                    )}
                </div>
            );
        };

        // 後台管理儀表板
        const AdminDashboard = ({ 
            isOpen, onClose, appList, setAppList, 
            changelogs, setChangelogs, upcomingFeatures, setUpcomingFeatures 
        }) => {
            const [activeTab, setActiveTab] = useState('manage'); 
            const [stats, setStats] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isSavingData, setIsSavingData] = useState(false);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const [editingApp, setEditingApp] = useState(null);
            const [formData, setFormData] = useState({});
            const [adminSearchTerm, setAdminSearchTerm] = useState('');
            const [adminCategoryFilter, setAdminCategoryFilter] = useState('all');
            const [adminSortBy, setAdminSortBy] = useState('newest'); 

            const [feedbacks, setFeedbacks] = useState([]);
            const [isFeedbacksLoading, setIsFeedbacksLoading] = useState(false);

            const [editLogs, setEditLogs] = useState([]);
            const [editUpcoming, setEditUpcoming] = useState([]);

            useEffect(() => {
                if (isOpen && activeTab === 'changelog') {
                    setEditLogs(changelogs.map(log => ({...log, featuresStr: Array.isArray(log.features) ? log.features.join('\n') : log.features})));
                    setEditUpcoming([...upcomingFeatures]);
                }
            }, [isOpen, activeTab, changelogs, upcomingFeatures]);

            // 讀取統計資料
            useEffect(() => {
                if (isOpen && activeTab === 'stats' && !stats) {
                    setLoading(true);
                    fetch(`${GOOGLE_APP_SCRIPT_URL}?action=get_stats`)
                        .then(res => res.json())
                        .then(data => { setStats(data); setLoading(false); })
                        .catch(err => { console.error(err); setLoading(false); });
                }
            }, [isOpen, activeTab, stats]);

            // 渲染圖表 (已修復：空狀態處理與生命週期)
            useEffect(() => {
                let chart = null;

                if (isOpen && activeTab === 'stats' && stats && stats.tools && stats.tools.length > 0 && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    
                    const toolsData = [...stats.tools];
                    const sortedTools = toolsData.sort((a, b) => b.clicks - a.clicks).slice(0, 10);
                    const labels = sortedTools.map(t => t.title);
                    const chartData = sortedTools.map(t => t.clicks);

                    chart = new window.Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: '工具點擊總次數',
                                data: chartData,
                                backgroundColor: 'rgba(20, 184, 166, 0.6)',
                                borderColor: 'rgba(13, 148, 136, 1)',
                                borderWidth: 1,
                                borderRadius: 4,
                                hoverBackgroundColor: 'rgba(20, 184, 166, 0.8)'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: false 
                                },
                                tooltip: {
                                    callbacks: {
                                        title: (context) => context[0].label
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: { 
                                        precision: 0,
                                        color: document.documentElement.classList.contains('dark') ? '#cbd5e1' : '#475569'
                                    },
                                    grid: {
                                        color: document.documentElement.classList.contains('dark') ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.05)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        color: document.documentElement.classList.contains('dark') ? '#cbd5e1' : '#475569',
                                        callback: function(value) {
                                            const label = this.getLabelForValue(value) || '';
                                            return label.length > 6 ? label.substring(0, 6) + '...' : label;
                                        }
                                    },
                                    grid: {
                                        display: false
                                    }
                                }
                            }
                        }
                    });
                }

                // Cleanup 銷毀圖表
                return () => {
                    if (chart) {
                        chart.destroy();
                    }
                };
            }, [isOpen, activeTab, stats]);

            useEffect(() => {
                if (isOpen && activeTab === 'feedback') {
                    setIsFeedbacksLoading(true);
                    fetch(`${GOOGLE_APP_SCRIPT_URL}?action=get_feedbacks`)
                        .then(res => res.json())
                        .then(data => { if (data.status === 'success') setFeedbacks(data.feedbacks || []); setIsFeedbacksLoading(false); })
                        .catch(err => { console.error(err); setIsFeedbacksLoading(false); });
                }
            }, [isOpen, activeTab]);

            const handleMarkFeedbackRead = async (row) => {
                try {
                    setFeedbacks(prev => prev.map(f => f.row === row ? { ...f, status: '已讀' } : f));
                    await fetch(GOOGLE_APP_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'mark_feedback_read', row: row })
                    });
                } catch (error) {
                    console.error('更新狀態失敗', error);
                }
            };

            const syncToBackend = async (newList, successMessage) => {
                setIsSavingData(true);
                try {
                    const response = await fetch(GOOGLE_APP_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'save_apps', apps: newList })
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        setAppList(newList);
                        if (successMessage) alert(successMessage);
                    } else {
                        throw new Error(result.message || 'Server returned error');
                    }
                } catch (error) {
                    console.error('儲存失敗', error);
                    alert('同步至資料庫失敗，請確認網路與權限。');
                } finally {
                    setIsSavingData(false);
                }
            };

            const syncChangelogsToBackend = async () => {
                setIsSavingData(true);
                try {
                    const formattedLogs = editLogs.map(log => ({
                        version: log.version,
                        date: log.date,
                        features: log.featuresStr ? log.featuresStr.split('\n').filter(s => s.trim()) : []
                    }));
                    
                    const response = await fetch(GOOGLE_APP_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ 
                            action: 'save_changelogs_upcoming', 
                            changelogs: formattedLogs,
                            upcomingFeatures: editUpcoming.filter(u => u.trim())
                        })
                    });
                    
                    const result = await response.json();
                    if (result.status === 'success') {
                        setChangelogs(formattedLogs);
                        setUpcomingFeatures(editUpcoming.filter(u => u.trim()));
                        alert('日誌與預期更新設定已成功儲存！');
                    } else {
                        throw new Error(result.message || 'Server error');
                    }
                } catch (error) {
                    console.error('儲存日誌失敗', error);
                    alert('同步失敗，請確認網路與權限。');
                } finally {
                    setIsSavingData(false);
                }
            };

            const handleAddLog = () => setEditLogs([{version: 'v1.0.0', date: new Date().toISOString().split('T')[0], featuresStr: ''}, ...editLogs]);
            const handleUpdateLog = (index, field, value) => {
                const newLogs = [...editLogs];
                newLogs[index][field] = value;
                setEditLogs(newLogs);
            };
            const handleRemoveLog = (index) => setEditLogs(editLogs.filter((_, i) => i !== index));

            const handleAddUpcoming = () => setEditUpcoming(['', ...editUpcoming]);
            const handleUpdateUpcoming = (index, value) => {
                const newUp = [...editUpcoming];
                newUp[index] = value;
                setEditUpcoming(newUp);
            };
            const handleRemoveUpcoming = (index) => setEditUpcoming(editUpcoming.filter((_, i) => i !== index));

            const handleEdit = (app) => {
                setFormData({
                    ...app,
                    tagsStr: app.tags ? app.tags.join(', ') : '',
                    aliasesStr: app.aliases ? app.aliases.join(', ') : '',
                    colorId: colorThemes.find(c => c.class === app.color)?.id || 'blue'
                });
                setEditingApp(app.id);
            };

            const handleNew = () => {
                setFormData({
                    title: '', description: '', url: '', category: 'clinical',
                    tagsStr: '', aliasesStr: '', colorId: 'blue', isPopular: false, isNew: true
                });
                setEditingApp('new');
            };

            const handleSave = (e) => {
                e.preventDefault();
                const newApp = {
                    id: editingApp === 'new' ? Date.now() : editingApp,
                    title: formData.title,
                    description: formData.description,
                    url: formData.url,
                    category: formData.category,
                    color: colorThemes.find(c => c.id === formData.colorId)?.class || colorThemes[0].class,
                    tags: formData.tagsStr.split(',').map(t => t.trim()).filter(t => t),
                    aliases: formData.aliasesStr.split(',').map(t => t.trim()).filter(t => t),
                    isPopular: formData.isPopular,
                    isNew: formData.isNew
                };

                let updatedList;
                if (editingApp === 'new') {
                    updatedList = [newApp, ...appList];
                } else {
                    updatedList = appList.map(a => a.id === editingApp ? newApp : a);
                }
                
                syncToBackend(updatedList, '卡片設定已成功儲存至雲端資料庫！');
                setEditingApp(null);
            };

            const handleDelete = (id) => {
                if (window.confirm('確定要刪除這個工具嗎？')) {
                    const updatedList = appList.filter(a => a.id !== id);
                    syncToBackend(updatedList, '卡片已成功刪除！');
                }
            };

            const filteredAdminApps = useMemo(() => {
                let res = appList;
                if (adminCategoryFilter !== 'all') {
                    res = res.filter(app => app.category === adminCategoryFilter);
                }
                if (adminSearchTerm.trim()) {
                    const term = adminSearchTerm.toLowerCase();
                    res = res.filter(app => 
                        app.title.toLowerCase().includes(term) || 
                        app.description.toLowerCase().includes(term) ||
                        (app.tags && app.tags.some(t => t.toLowerCase().includes(term)))
                    );
                }
                res.sort((a, b) => {
                    if (adminSortBy === 'newest') return b.id - a.id;
                    if (adminSortBy === 'popular') return (b.isPopular === a.isPopular) ? (b.id - a.id) : (b.isPopular ? 1 : -1);
                    if (adminSortBy === 'name') return a.title.localeCompare(b.title, 'zh-TW');
                    return 0;
                });
                return res;
            }, [appList, adminCategoryFilter, adminSearchTerm, adminSortBy]);

            if (!isOpen) return null;

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="後台管理面板" maxWidthClass="max-w-4xl">
                    <div className="flex gap-1 md:gap-4 mb-6 border-b border-slate-200 dark:border-slate-700 overflow-x-auto pb-1">
                        <button onClick={() => setActiveTab('manage')} className={`px-3 py-2 border-b-2 font-medium transition-colors flex items-center gap-1.5 whitespace-nowrap ${activeTab === 'manage' ? 'border-teal-500 text-teal-600 dark:text-teal-400' : 'border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200'}`}>
                            <Settings size={18}/> 工具管理
                        </button>
                        <button onClick={() => setActiveTab('changelog')} className={`px-3 py-2 border-b-2 font-medium transition-colors flex items-center gap-1.5 whitespace-nowrap ${activeTab === 'changelog' ? 'border-teal-500 text-teal-600 dark:text-teal-400' : 'border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200'}`}>
                            <History size={18}/> 日誌管理
                        </button>
                        <button onClick={() => setActiveTab('feedback')} className={`px-3 py-2 border-b-2 font-medium transition-colors flex items-center gap-1.5 whitespace-nowrap ${activeTab === 'feedback' ? 'border-teal-500 text-teal-600 dark:text-teal-400' : 'border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200'}`}>
                            <MessageSquare size={18}/> 意見回饋 
                            {feedbacks.some(f => f.status === '未讀') && <span className="w-2 h-2 rounded-full bg-red-500 ml-1 animate-pulse"></span>}
                        </button>
                        <button onClick={() => setActiveTab('stats')} className={`px-3 py-2 border-b-2 font-medium transition-colors flex items-center gap-1.5 whitespace-nowrap ${activeTab === 'stats' ? 'border-teal-500 text-teal-600 dark:text-teal-400' : 'border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200'}`}>
                            <BarChart size={18}/> 數據分析
                        </button>
                    </div>

                    {activeTab === 'manage' && (
                        <div>
                            {editingApp === null ? (
                                <div className="animate-[fadeIn_0.3s_ease-out]">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-5">
                                        <div className="flex flex-1 flex-col sm:flex-row gap-3 w-full">
                                            <div className="relative flex-1">
                                                <Search className="absolute left-3 top-2.5 text-slate-400 dark:text-slate-500" size={18} />
                                                <input 
                                                    type="text" 
                                                    placeholder="搜尋工具名稱或描述..." 
                                                    value={adminSearchTerm} 
                                                    onChange={e => setAdminSearchTerm(e.target.value)}
                                                    className="w-full pl-10 pr-4 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-teal-500 outline-none"
                                                />
                                            </div>
                                            <div className="flex gap-2">
                                                <div className="relative">
                                                    <Filter className="absolute left-3 top-2.5 text-slate-400" size={16} />
                                                    <select 
                                                        value={adminCategoryFilter} 
                                                        onChange={e => setAdminCategoryFilter(e.target.value)}
                                                        className="pl-9 pr-8 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-teal-500 outline-none appearance-none"
                                                    >
                                                        <option value="all">所有分類</option>
                                                        {Object.entries(categoryMeta).filter(([k, v]) => k !== 'favorites' && k !== 'all').map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
                                                    </select>
                                                </div>
                                                <div className="relative">
                                                    <SortAsc className="absolute left-3 top-2.5 text-slate-400" size={16} />
                                                    <select 
                                                        value={adminSortBy} 
                                                        onChange={e => setAdminSortBy(e.target.value)}
                                                        className="pl-9 pr-8 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-teal-500 outline-none appearance-none"
                                                    >
                                                        <option value="newest">最新加入</option>
                                                        <option value="popular">熱門優先</option>
                                                        <option value="name">標題排序</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>

                                        <button onClick={handleNew} className="shrink-0 bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm shadow-sm transition-colors">
                                            <Plus size={16}/> 新增工具
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-2">
                                        {filteredAdminApps.length > 0 ? filteredAdminApps.map(app => (
                                            <div key={app.id} className="flex justify-between items-center p-4 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800/50 hover:bg-white dark:hover:bg-slate-800 transition-colors">
                                                <div>
                                                    <div className="font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                                        {app.title} 
                                                        {app.isPopular && <span className="bg-orange-100 text-orange-600 dark:bg-orange-900/50 dark:text-orange-400 text-[10px] px-2 py-0.5 rounded">HOT</span>}
                                                    </div>
                                                    <div className="text-sm text-slate-500 dark:text-slate-400 mt-1">
                                                        <span className="font-medium mr-2">{categoryMeta[app.category]?.name}</span>
                                                        {app.tags && app.tags.join(', ')}
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => handleEdit(app)} className="p-2 text-slate-500 hover:text-blue-500 bg-white dark:bg-slate-700 rounded-lg shadow-sm border border-slate-200 dark:border-slate-600 transition-colors" title="編輯">
                                                        <Edit3 size={18}/>
                                                    </button>
                                                    <button onClick={() => handleDelete(app.id)} className="p-2 text-slate-500 hover:text-red-500 bg-white dark:bg-slate-700 rounded-lg shadow-sm border border-slate-200 dark:border-slate-600 transition-colors" title="刪除">
                                                        <Trash2 size={18}/>
                                                    </button>
                                                </div>
                                            </div>
                                        )) : (
                                            <div className="text-center py-8 text-slate-500 dark:text-slate-400">
                                                找不到符合條件的工具...
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <form onSubmit={handleSave} className="animate-[fadeIn_0.3s_ease-out] bg-slate-50 dark:bg-slate-800/50 p-6 rounded-xl border border-slate-200 dark:border-slate-700">
                                    <div className="flex justify-between items-center mb-6 border-b pb-4 dark:border-slate-700">
                                        <h4 className="font-bold text-xl text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                            {editingApp === 'new' ? <><Plus size={20} className="text-teal-500"/> 新增工具卡片</> : <><Edit3 size={20} className="text-blue-500"/> 編輯工具卡片</>}
                                        </h4>
                                        <button type="button" onClick={() => setEditingApp(null)} className="text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                                            <X size={20}/>
                                        </button>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div>
                                            <label className="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">標題 Title *</label>
                                            <input required value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-teal-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">所屬分類 Category *</label>
                                            <select required value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-teal-500 outline-none">
                                                {Object.entries(categoryMeta)
                                                    .filter(([k, v]) => k !== 'favorites' && k !== 'all')
                                                    .map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
                                            </select>
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">描述 Description *</label>
                                            <textarea required rows="2" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-teal-500 outline-none resize-none"></textarea>
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">目標網址 URL *</label>
                                            <input required type="url" value={formData.url} onChange={e => setFormData({...formData, url: e.target.value})} placeholder="https://" className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-teal-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">標籤 Tags (請以逗號分隔)</label>
                                            <input value={formData.tagsStr} onChange={e => setFormData({...formData, tagsStr: e.target.value})} placeholder="例如: 劑量, 腎功能" className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-teal-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">圖示與外觀顏色</label>
                                            <select value={formData.colorId} onChange={e => setFormData({...formData, colorId: e.target.value})} className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-teal-500 outline-none">
                                                {colorThemes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">搜尋別名 Aliases (逗號分隔)</label>
                                            <input value={formData.aliasesStr} onChange={e => setFormData({...formData, aliasesStr: e.target.value})} placeholder="隱藏的搜尋關鍵字，例如: egfr" className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-teal-500 outline-none" />
                                        </div>
                                        <div className="flex items-center gap-6 mt-4">
                                            <label className="flex items-center gap-2 font-medium text-slate-700 dark:text-slate-300 cursor-pointer">
                                                <input type="checkbox" checked={formData.isPopular} onChange={e => setFormData({...formData, isPopular: e.target.checked})} className="w-4 h-4 rounded text-teal-600 focus:ring-teal-500" />
                                                標註為熱門 (HOT)
                                            </label>
                                            <label className="flex items-center gap-2 font-medium text-slate-700 dark:text-slate-300 cursor-pointer">
                                                <input type="checkbox" checked={formData.isNew} onChange={e => setFormData({...formData, isNew: e.target.checked})} className="w-4 h-4 rounded text-teal-600 focus:ring-teal-500" />
                                                標註為最新 (NEW)
                                            </label>
                                        </div>
                                    </div>
                                    
                                    <div className="flex justify-end gap-3 mt-8 pt-4 border-t dark:border-slate-700">
                                        <button type="button" onClick={() => setEditingApp(null)} disabled={isSavingData} className="px-5 py-2.5 border border-slate-300 text-slate-700 rounded-lg dark:border-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors font-medium disabled:opacity-50">取消</button>
                                        <button type="submit" disabled={isSavingData} className="px-5 py-2.5 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition-colors font-medium shadow-sm flex items-center gap-2 disabled:opacity-50">
                                            {isSavingData ? <Activity size={18} className="animate-spin" /> : <CheckCircle size={18}/>} 
                                            {isSavingData ? '同步儲存中...' : '儲存卡片設定'}
                                        </button>
                                    </div>
                                </form>
                            )}
                        </div>
                    )}

                    {activeTab === 'changelog' && (
                        <div className="animate-[fadeIn_0.3s_ease-out]">
                            <div className="flex justify-between items-center mb-4">
                                <p className="text-slate-500 dark:text-slate-400 text-sm">維護前端顯示的更新日誌與預期功能清單。</p>
                                <button onClick={syncChangelogsToBackend} disabled={isSavingData} className="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm shadow-sm transition-colors disabled:opacity-50">
                                    {isSavingData ? <Activity size={16} className="animate-spin"/> : <CheckCircle size={16}/>} 
                                    {isSavingData ? '儲存中...' : '儲存變更至雲端'}
                                </button>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-h-[60vh] overflow-y-auto pr-2">
                                <div>
                                    <div className="flex justify-between items-center mb-3">
                                        <h4 className="font-bold text-slate-700 dark:text-slate-200">系統更新日誌</h4>
                                        <button type="button" onClick={handleAddLog} className="text-teal-600 text-sm font-medium flex items-center gap-1 hover:text-teal-700"><Plus size={14}/>新增</button>
                                    </div>
                                    <div className="space-y-4">
                                        {editLogs.map((log, index) => (
                                            <div key={index} className="p-4 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800/50">
                                                <div className="flex gap-2 mb-2">
                                                    <input value={log.version} onChange={e => handleUpdateLog(index, 'version', e.target.value)} placeholder="v1.0.0" className="w-1/2 px-2 py-1 text-sm rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100" />
                                                    <input value={log.date} onChange={e => handleUpdateLog(index, 'date', e.target.value)} placeholder="YYYY/MM/DD" className="w-1/2 px-2 py-1 text-sm rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100" />
                                                </div>
                                                <textarea rows="3" value={log.featuresStr} onChange={e => handleUpdateLog(index, 'featuresStr', e.target.value)} placeholder="更新內容 (多行代表多項)" className="w-full px-2 py-1 text-sm rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 resize-none mb-2"></textarea>
                                                <div className="flex justify-end">
                                                    <button onClick={() => handleRemoveLog(index)} className="text-red-500 hover:text-red-700 text-xs font-medium flex items-center gap-1"><Trash2 size={12}/>移除此筆</button>
                                                </div>
                                            </div>
                                        ))}
                                        {editLogs.length === 0 && <p className="text-sm text-slate-500">暫無日誌記錄</p>}
                                    </div>
                                </div>
                                <div>
                                    <div className="flex justify-between items-center mb-3">
                                        <h4 className="font-bold text-slate-700 dark:text-slate-200">預計更新項目</h4>
                                        <button type="button" onClick={handleAddUpcoming} className="text-amber-500 text-sm font-medium flex items-center gap-1 hover:text-amber-600"><Plus size={14}/>新增</button>
                                    </div>
                                    <div className="space-y-3">
                                        {editUpcoming.map((item, index) => (
                                            <div key={index} className="flex items-center gap-2">
                                                <span className="text-amber-500"><Sparkles size={16}/></span>
                                                <input value={item} onChange={e => handleUpdateUpcoming(index, e.target.value)} placeholder="功能描述..." className="flex-1 px-3 py-1.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100" />
                                                <button onClick={() => handleRemoveUpcoming(index)} className="text-slate-400 hover:text-red-500 p-1"><Trash2 size={16}/></button>
                                            </div>
                                        ))}
                                        {editUpcoming.length === 0 && <p className="text-sm text-slate-500">暫無預計更新項目</p>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'feedback' && (
                        <div className="animate-[fadeIn_0.3s_ease-out]">
                            <p className="text-slate-500 dark:text-slate-400 text-sm mb-4">使用者提交的意見回饋清單 (僅管理員可見)。</p>
                            
                            {isFeedbacksLoading ? (
                                <div className="text-center py-10 text-slate-400 animate-pulse flex flex-col items-center">
                                    <Activity size={32} className="mb-2 animate-spin" /> 讀取中...
                                </div>
                            ) : (
                                <div className="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                                    {feedbacks.length > 0 ? feedbacks.map((fb, idx) => (
                                        <div key={idx} className={`p-5 border rounded-xl transition-colors ${fb.status === '未讀' ? 'bg-white dark:bg-slate-800 border-red-200 dark:border-red-900/50 shadow-sm' : 'bg-slate-50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700 opacity-75'}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <div className="flex items-center gap-3">
                                                    <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${fb.status === '未讀' ? 'bg-red-100 text-red-600 dark:bg-red-900/50 dark:text-red-400' : 'bg-slate-200 text-slate-600 dark:bg-slate-700 dark:text-slate-400'}`}>
                                                        {fb.status}
                                                    </span>
                                                    <span className="text-sm font-bold text-slate-700 dark:text-slate-200">{fb.type}</span>
                                                    <span className="text-xs text-slate-400">{fb.time}</span>
                                                </div>
                                                {fb.status === '未讀' && (
                                                    <button onClick={() => handleMarkFeedbackRead(fb.row)} className="text-xs font-medium text-teal-600 hover:text-teal-700 dark:text-teal-400 dark:hover:text-teal-300 flex items-center gap-1 border border-teal-200 dark:border-teal-800 px-2 py-1 rounded bg-teal-50 dark:bg-teal-900/30">
                                                        <CheckCircle size={14}/> 標記已讀
                                                    </button>
                                                )}
                                            </div>
                                            <p className="text-slate-600 dark:text-slate-300 text-sm whitespace-pre-wrap mt-2">{fb.desc}</p>
                                        </div>
                                    )) : (
                                        <div className="text-center py-8 text-slate-500 dark:text-slate-400">
                                            目前沒有任何意見回饋。
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'stats' && (
                        <div className="space-y-6 animate-[fadeIn_0.3s_ease-out]">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 text-center">
                                    <p className="text-slate-500 dark:text-slate-400 text-sm mb-1">累積網站總瀏覽量</p>
                                    <p className="text-3xl font-bold text-teal-600 dark:text-teal-400">{stats ? stats.totalViews : '-'}</p>
                                </div>
                                <div className="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 text-center">
                                    <p className="text-slate-500 dark:text-slate-400 text-sm mb-1">上線工具總數</p>
                                    <p className="text-3xl font-bold text-slate-700 dark:text-slate-300">{appList.length}</p>
                                </div>
                            </div>
                            
                            <div className="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 h-72 relative flex items-center justify-center overflow-hidden">
                                {loading ? (
                                    <div className="text-slate-400 animate-pulse flex flex-col items-center">
                                        <Activity size={32} className="mb-2 animate-spin" /> 載入大數據中...
                                    </div>
                                ) : stats && (!stats.tools || stats.tools.length === 0) ? (
                                    <div className="text-slate-400 flex flex-col items-center animate-[fadeIn_0.5s_ease-out]">
                                        <BarChart size={48} className="mb-3 opacity-30" />
                                        <p className="font-medium">目前尚無個別工具的點擊數據</p>
                                        <p className="text-sm mt-1 opacity-70">當使用者點擊首頁的工具連結後，數據將顯示於此</p>
                                    </div>
                                ) : (
                                    <div className="absolute inset-0 p-4 pt-6">
                                        <canvas ref={chartRef}></canvas>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </Modal>
            );
        };

        const ITEMS_PER_PAGE = 15;

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(() => {
                return sessionStorage.getItem('pharma_tools_auth') === 'true';
            });
            const [isAdmin, setIsAdmin] = useState(() => {
                return sessionStorage.getItem('pharma_tools_admin') === 'true';
            });
            
            // ==========================================
            // 工具清單與資料庫串接區 (雲端同步)
            // ==========================================
            const [appList, setAppList] = useState(initialAppsData);
            const [isAppsLoading, setIsAppsLoading] = useState(false);

            useEffect(() => {
                if (isAuthenticated) {
                    setIsAppsLoading(true);
                    fetch(`${GOOGLE_APP_SCRIPT_URL}?action=get_apps`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.status === 'success' && data.apps && data.apps.length > 0) {
                                setAppList(data.apps);
                            }
                        })
                        .catch(err => console.error("無法從資料庫取得工具清單", err))
                        .finally(() => setIsAppsLoading(false));
                }
            }, [isAuthenticated]);

            // 動態計算可用分類
            const availableCategories = useMemo(() => new Set(appList.map(app => app.category)), [appList]);
            const dynamicCategories = useMemo(() => {
                const predefinedOrder = ['all', 'favorites', 'clinical', 'education', 'sup', 'information', 'else', 'admin'];
                const uniqueCategories = predefinedOrder.filter(cat => cat === 'all' || cat === 'favorites' || availableCategories.has(cat));
                
                return uniqueCategories.map(catId => ({
                    id: catId,
                    name: catId === 'all' ? '全部工具' : (categoryMeta[catId]?.name || catId),
                    icon: catId === 'all' ? <Pill size={18} /> : (categoryMeta[catId]?.icon || <Activity size={18} />)
                }));
            }, [availableCategories]);

            const [searchTerm, setSearchTerm] = useState("");
            const [debouncedSearchTerm, setDebouncedSearchTerm] = useState("");
            const [activeCategory, setActiveCategory] = useState("all");
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            
            const [showAbout, setShowAbout] = useState(false);
            const [showChangelog, setShowChangelog] = useState(false);
            const [showLinks, setShowLinks] = useState(false);
            const [showFeedback, setShowFeedback] = useState(false);
            const [showAdminPanel, setShowAdminPanel] = useState(false);

            const [feedbackType, setFeedbackType] = useState("工具新增許願");
            const [feedbackDesc, setFeedbackDesc] = useState("");
            const [isSubmittingFeedback, setIsSubmittingFeedback] = useState(false);
            const [feedbackSuccess, setFeedbackSuccess] = useState(false);

            const [currentPage, setCurrentPage] = useState(1);
            const [showBackToTop, setShowBackToTop] = useState(false);
            const [pageViews, setPageViews] = useState(null);

            const [changelogs, setChangelogs] = useState([]);
            const [upcomingFeatures, setUpcomingFeatures] = useState([]);
            const [showUpcomingView, setShowUpcomingView] = useState(false);
            const [expandedLogIndex, setExpandedLogIndex] = useState(0); 
            const [hasNewChangelog, setHasNewChangelog] = useState(false); 

            const searchInputRef = useRef(null); 
            const searchRef = useRef(null);

            useEffect(() => {
                if (showChangelog) {
                    setExpandedLogIndex(0);
                    setShowUpcomingView(false); 
                    setHasNewChangelog(false);
                    if (changelogs.length > 0) {
                        localStorage.setItem('pharma_tools_last_read_version', changelogs[0].version);
                    }
                }
            }, [showChangelog, changelogs]);

            const [bookmarks, setBookmarks] = useState(() => {
                const saved = localStorage.getItem('pharma_tools_bookmarks');
                return saved ? JSON.parse(saved) : [];
            });

            const [isDarkMode, setIsDarkMode] = useState(() => {
                const saved = localStorage.getItem('pharma_tools_theme');
                if (saved) return saved === 'dark';
                return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            });

            const handleLoginSuccess = (adminFlag = false) => {
                setIsAuthenticated(true);
                sessionStorage.setItem('pharma_tools_auth', 'true');
                if (adminFlag) {
                    setIsAdmin(true);
                    sessionStorage.setItem('pharma_tools_admin', 'true');
                }
            };

            useEffect(() => {
                localStorage.setItem('pharma_tools_bookmarks', JSON.stringify(bookmarks));
            }, [bookmarks]);

            const toggleBookmark = (id) => {
                setBookmarks(prev => 
                    prev.includes(id) ? prev.filter(bId => bId !== id) : [...prev, id]
                );
            };

            useEffect(() => {
                localStorage.setItem('pharma_tools_theme', isDarkMode ? 'dark' : 'light');
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
