                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode]);

            useEffect(() => {
                if (isAuthenticated) {
                    const isTracked = sessionStorage.getItem('page_view_tracked');
                    const action = isTracked ? 'get_views' : 'record_view';
                    
                    fetch(`${GOOGLE_APP_SCRIPT_URL}?action=${action}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.views !== undefined) setPageViews(data.views);
                            if (!isTracked) sessionStorage.setItem('page_view_tracked', 'true');
                        })
                        .catch(err => console.error("無法取得瀏覽次數", err));

                    fetch(`${GOOGLE_APP_SCRIPT_URL}?action=get_changelogs`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.changelogs && data.changelogs.length > 0) {
                                setChangelogs(data.changelogs.slice(0, 5));
                                
                                const latestVersion = data.changelogs[0].version;
                                const readVersion = localStorage.getItem('pharma_tools_last_read_version');
                                if (latestVersion !== readVersion) {
                                    setHasNewChangelog(true); 
                                }
                            }
                            if (data.upcomingFeatures) {
                                setUpcomingFeatures(data.upcomingFeatures);
                            }
                        })
                        .catch(err => console.error("無法取得更新日誌", err));
                }
            }, [isAuthenticated]);

            const handleTrackClick = (appId, appTitle) => {
                const trackedKey = 'pharma_tools_tracked_clicks';
                const trackedClicks = JSON.parse(sessionStorage.getItem(trackedKey) || '[]');
                
                if (!trackedClicks.includes(appId)) {
                    fetch(`${GOOGLE_APP_SCRIPT_URL}?action=track_click&id=${appId}&title=${encodeURIComponent(appTitle)}`)
                        .catch(err => console.error("點擊記錄失敗", err));
                    
                    trackedClicks.push(appId);
                    sessionStorage.setItem(trackedKey, JSON.stringify(trackedClicks));
                }
            };

            const handleFeedbackSubmit = async (e) => {
                e.preventDefault();
                if (!feedbackDesc.trim()) return;
                
                setIsSubmittingFeedback(true);
                try {
                    const response = await fetch(`${GOOGLE_APP_SCRIPT_URL}?action=feedback&type=${encodeURIComponent(feedbackType)}&desc=${encodeURIComponent(feedbackDesc)}`, {
                        method: 'GET'
                    });
                    if (!response.ok) throw new Error("Network Error");
                    
                    setFeedbackSuccess(true);
                    setTimeout(() => {
                        setShowFeedback(false);
                        setFeedbackSuccess(false);
                        setFeedbackDesc("");
                        setFeedbackType("工具新增許願");
                    }, 2000);
                } catch (err) {
                    if (err.name === "TypeError" && err.message === "Failed to fetch") {
                        setFeedbackSuccess(true);
                        setTimeout(() => {
                            setShowFeedback(false);
                            setFeedbackSuccess(false);
                            setFeedbackDesc("");
                            setFeedbackType("工具新增許願");
                        }, 2000);
                    } else {
                        alert("連線發生異常，請稍後再試。");
                    }
                } finally {
                    setIsSubmittingFeedback(false);
                }
            };

            useEffect(() => {
                const timer = setTimeout(() => {
                    setDebouncedSearchTerm(searchTerm);
                }, 300);
                return () => clearTimeout(timer);
            }, [searchTerm]);

            useEffect(() => {
                setCurrentPage(1);
            }, [debouncedSearchTerm, activeCategory]);

            useEffect(() => {
                if (searchRef.current && isAuthenticated) {
                    const headerOffset = 100;
                    const elementPosition = searchRef.current.getBoundingClientRect().top;
                    const absoluteElementPosition = elementPosition + window.pageYOffset;
                    
                    if (window.scrollY > absoluteElementPosition - headerOffset) {
                        window.scrollTo({
                            top: absoluteElementPosition - headerOffset,
                            behavior: "smooth"
                        });
                    }
                }
            }, [debouncedSearchTerm, activeCategory, currentPage, isAuthenticated]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    const isInputFocused = document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA';

                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                        e.preventDefault();
                        searchInputRef.current?.focus();
                    }
                    if (e.key === '/' && !isInputFocused) {
                        e.preventDefault();
                        searchInputRef.current?.focus();
                    }

                    if (e.key === 'Escape') {
                        setShowAbout(false);
                        setShowChangelog(false);
                        setShowLinks(false);
                        setShowFeedback(false);
                        setShowAdminPanel(false);
                        if (document.activeElement === searchInputRef.current) {
                            setSearchTerm("");
                            searchInputRef.current.blur();
                        }
                    }
                };

                window.addEventListener("keydown", handleKeyDown);
                return () => window.removeEventListener("keydown", handleKeyDown);
            }, []);

            useEffect(() => {
                const handleScroll = () => {
                    setShowBackToTop(window.scrollY > 400);
                };
                window.addEventListener("scroll", handleScroll);
                return () => window.removeEventListener("scroll", handleScroll);
            }, []);

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex flex-col relative overflow-hidden transition-colors duration-300">
                        <div className="blob-bg"></div>
                        <LoginScreen onLogin={handleLoginSuccess} />
                    </div>
                );
            }

            const searchTerms = debouncedSearchTerm.toLowerCase().split(' ').filter(t => t.trim() !== '');

            const filteredApps = appList.filter(app => {
                if (!isAdmin && activeCategory === 'all' && app.category === 'admin') return false;

                const matchesSearch = searchTerms.length === 0 || searchTerms.every(term => {
                    if (term.startsWith('#')) {
                        const tagTerm = term.slice(1);
                        return app.tags && app.tags.some(tag => tag.toLowerCase().includes(tagTerm));
                    } else {
                        return app.title.toLowerCase().includes(term) ||
                               app.description.toLowerCase().includes(term) ||
                               (app.tags && app.tags.some(tag => tag.toLowerCase().includes(term))) ||
                               (app.aliases && app.aliases.some(alias => alias.toLowerCase().includes(term)));
                    }
                });
                
                const matchesCategory = activeCategory === 'all' || 
                                      (activeCategory === 'favorites' && bookmarks.includes(app.id)) || 
                                      app.category === activeCategory;
                
                return matchesSearch && matchesCategory;
            }).sort((a, b) => {
                return (b.isPopular ? 1 : 0) - (a.isPopular ? 1 : 0);
            });

            const handleTagClick = (tag) => {
                const tagString = `#${tag}`;
                setSearchTerm(prev => {
                    const terms = prev.split(' ').filter(t => t.trim() !== '');
                    if (!terms.includes(tagString)) {
                        return [...terms, tagString].join(' ') + ' ';
                    }
                    return prev;
                });
                searchInputRef.current?.focus();
                window.scrollTo({
                    top: searchRef.current.getBoundingClientRect().top + window.pageYOffset - 100,
                    behavior: "smooth"
                });
            };

            const totalPages = Math.ceil(filteredApps.length / ITEMS_PER_PAGE);
            const currentApps = filteredApps.slice(
                (currentPage - 1) * ITEMS_PER_PAGE,
                currentPage * ITEMS_PER_PAGE
            );

            return (
                <div className="min-h-screen flex flex-col relative overflow-x-hidden animate-[fadeIn_0.5s_ease-out] transition-colors duration-300">
                    <div className="blob-bg"></div>

                    {/* Header */}
                    <header className="fixed w-full z-50 glass-effect">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center gap-3 cursor-pointer group" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                                    <div className="bg-teal-500 group-hover:bg-teal-600 transition-colors p-2 rounded-xl text-white shadow-lg shadow-teal-200 dark:shadow-none">
                                        <HeartPulse size={24} />
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold text-slate-800 dark:text-slate-100 tracking-tight leading-none group-hover:text-teal-700 dark:group-hover:text-teal-400 transition-colors">Pharmacy Tools</h1>
                                        <p className="text-[10px] text-teal-600 dark:text-teal-400 font-bold uppercase tracking-wider mt-0.5">Clinical & Digital</p>
                                    </div>
                                </div>

                                {/* Desktop Nav */}
                                <nav className="hidden md:flex items-center gap-1">
                                    <button onClick={() => setShowAbout(true)} className="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-teal-700 dark:hover:text-teal-400 hover:bg-teal-50 dark:hover:bg-slate-800 rounded-lg transition-all flex items-center gap-1"><Info size={16} />關於本站</button>
                                    
                                    <button onClick={() => setShowChangelog(true)} className="relative px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-teal-700 dark:hover:text-teal-400 hover:bg-teal-50 dark:hover:bg-slate-800 rounded-lg transition-all flex items-center gap-1">
                                        <History size={16} />更新日誌
                                        {hasNewChangelog && (
                                            <span className="absolute top-1.5 right-2 flex h-2.5 w-2.5">
                                              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                              <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500 border border-white dark:border-slate-800"></span>
                                            </span>
                                        )}
                                    </button>
                                    
                                    <button onClick={() => setShowLinks(true)} className="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-teal-700 dark:hover:text-teal-400 hover:bg-teal-50 dark:hover:bg-slate-800 rounded-lg transition-all flex items-center gap-1"><Link size={16} />外部連結</button>
                                    <button onClick={() => setShowFeedback(true)} className="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-teal-700 dark:hover:text-teal-400 hover:bg-teal-50 dark:hover:bg-slate-800 rounded-lg transition-all flex items-center gap-1"><MessageSquare size={16} />意見回饋</button>
                                    <div className="w-px h-4 bg-slate-300 dark:bg-slate-700 mx-2"></div>
                                    <button 
                                        onClick={() => setIsDarkMode(!isDarkMode)} 
                                        className="p-2 text-slate-400 dark:text-slate-300 hover:text-amber-500 dark:hover:text-amber-400 hover:bg-amber-50 dark:hover:bg-slate-800 rounded-lg transition-all"
                                        title={isDarkMode ? "切換至淺色模式" : "切換至深色模式"}
                                    >
                                        {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                                    </button>

                                    {isAdmin && (
                                        <button 
                                            onClick={() => setShowAdminPanel(true)} 
                                            className="p-2 text-teal-600 dark:text-teal-400 bg-teal-50 dark:bg-teal-900/30 hover:bg-teal-100 dark:hover:bg-teal-800/50 rounded-lg transition-all ml-1"
                                            title="後台設定"
                                        >
                                            <Settings size={20} />
                                        </button>
                                    )}
                                </nav>

                                {/* Mobile Menu Button */}
                                <div className="md:hidden flex items-center gap-2">
                                    <button 
                                        onClick={() => setIsDarkMode(!isDarkMode)} 
                                        className="p-2 text-slate-400 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"
                                    >
                                        {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                                    </button>
                                    {isAdmin && (
                                        <button 
                                            onClick={() => setShowAdminPanel(true)} 
                                            className="p-2 text-teal-600 dark:text-teal-400 hover:bg-teal-50 dark:hover:bg-slate-800 rounded-lg"
                                        >
                                            <Settings size={20} />
                                        </button>
                                    )}
                                    <button 
                                        className="p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg relative"
                                        onClick={() => setIsMenuOpen(!isMenuOpen)}
                                    >
                                        {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
                                        {hasNewChangelog && !isMenuOpen && (
                                            <span className="absolute top-2 right-2 flex h-2.5 w-2.5">
                                              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                              <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500 border border-white dark:border-slate-800"></span>
                                            </span>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Mobile Nav */}
                        {isMenuOpen && (
                            <div className="md:hidden bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 shadow-xl">
                                <div className="px-4 pt-2 pb-4 space-y-1">
                                    <button onClick={() => {setShowAbout(true); setIsMenuOpen(false)}} className="block w-full text-left px-4 py-3 text-base font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg flex items-center gap-2"><Info size={18} />關於本站</button>
                                    
                                    <button onClick={() => {setShowChangelog(true); setIsMenuOpen(false)}} className="block w-full text-left px-4 py-3 text-base font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg flex items-center gap-2 relative">
                                        <History size={18} />更新日誌
                                        {hasNewChangelog && (
                                            <span className="ml-2 flex h-2 w-2">
                                              <span className="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-red-400 opacity-75"></span>
                                              <span className="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                                            </span>
                                        )}
                                    </button>
                                    
                                    <button onClick={() => {setShowLinks(true); setIsMenuOpen(false)}} className="block w-full text-left px-4 py-3 text-base font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg flex items-center gap-2"><Link size={18} />外部連結</button>
                                    <button onClick={() => {setShowFeedback(true); setIsMenuOpen(false)}} className="block w-full text-left px-4 py-3 text-base font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg flex items-center gap-2"><MessageSquare size={18} />意見回饋</button>
                                </div>
                            </div>
                        )}
                    </header>

                    {/* Admin Dashboard Modal */}
                    <AdminDashboard 
                        isOpen={showAdminPanel} 
                        onClose={() => setShowAdminPanel(false)} 
                        appList={appList}
                        setAppList={setAppList}
                        changelogs={changelogs}
                        setChangelogs={setChangelogs}
                        upcomingFeatures={upcomingFeatures}
                        setUpcomingFeatures={setUpcomingFeatures}
                    />

                    <Modal isOpen={showAbout} onClose={() => setShowAbout(false)} title="關於本站">
                        <div className="space-y-6 text-slate-600 dark:text-slate-300">
                            <div className="flex items-center gap-4 p-5 bg-gradient-to-br from-teal-50 to-white dark:from-teal-900/30 dark:to-slate-800 rounded-2xl border border-teal-100 dark:border-teal-900/50 shadow-sm">
                                <div className="bg-white dark:bg-slate-800 p-3 rounded-full shadow-md text-teal-600 dark:text-teal-400 ring-4 ring-teal-50 dark:ring-teal-900/30">
                                    <User size={32} />
                                </div>
                                <div>
                                    <h4 className="font-bold text-lg text-slate-800 dark:text-slate-100">製作者：其仁藥師</h4>
                                </div>
                            </div>
                            
                            <p className="leading-relaxed">
                                Pharmacy Tools 是一個專為藥師與醫療人員設計的臨床工具入口網站。整合了各種臨床計算與行政輔助工具，簡化繁瑣的日常作業，讓專業人員能將更多時間投入在病人照護上。
                            </p>

                            <div className="mt-4">
                                <h4 className="font-bold text-slate-800 dark:text-slate-100 mb-2 flex items-center gap-2">
                                    <Info size={18} className="text-amber-500"/> 免責聲明
                                </h4>
                                <div className="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700 text-sm space-y-2">
                                    <p>• 本站所有工具僅供專業人員輔助參考。</p>
                                    <p>• 工具產出結果可能存在誤差，臨床決策請務必依據專業判斷。</p>
                                    <p>• 使用者應對工具產出結果進行最終確認。</p>
                                </div>
                            </div>
                        </div>
                    </Modal>

                    <Modal 
                        isOpen={showChangelog} 
                        onClose={() => setShowChangelog(false)} 
                        title={showUpcomingView ? "預計更新項目" : "更新日誌"}
                        maxWidthClass="max-w-4xl"
                        headerRight={
                            <button
                                onClick={() => setShowUpcomingView(!showUpcomingView)}
                                className="px-3 py-1.5 text-sm bg-teal-50 dark:bg-teal-900/30 text-teal-600 dark:text-teal-400 rounded-lg hover:bg-teal-100 dark:hover:bg-teal-800/50 transition-colors flex items-center gap-1 font-medium border border-teal-200 dark:border-teal-800 shadow-sm"
                            >
                                {showUpcomingView ? <History size={16} /> : <Sparkles size={16} />}
                                {showUpcomingView ? "返回更新日誌" : "預計更新項目"}
                            </button>
                        }
                    >
                        {showUpcomingView ? (
                            <div className="space-y-4 animate-[fadeIn_0.3s_ease-out]">
                                {upcomingFeatures.length > 0 ? (
                                    <div className="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-xl border border-slate-200 dark:border-slate-700">
                                        <ul className="space-y-3">
                                            {upcomingFeatures.map((feature, index) => (
                                                <li key={index} className="text-slate-700 dark:text-slate-300 flex items-start gap-3">
                                                    <span className="text-amber-500 mt-0.5"><Sparkles size={18} /></span>
                                                    <span className="leading-relaxed">{feature}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                ) : (
                                    <div className="text-center py-8 text-slate-500 dark:text-slate-400">
                                        目前尚無預計更新項目...
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-4 animate-[fadeIn_0.3s_ease-out]">
                                {changelogs.length > 0 ? changelogs.map((log, index) => (
                                    <div key={index} className="border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden bg-white dark:bg-slate-800 transition-all">
                                        <button 
                                            onClick={() => setExpandedLogIndex(expandedLogIndex === index ? -1 : index)}
                                            className="w-full flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-left"
                                        >
                                            <div className="flex items-baseline gap-3">
                                                <h4 className="font-bold text-lg text-slate-800 dark:text-slate-100">{log.version}</h4>
                                                <span className="text-xs text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-700 px-2 py-0.5 rounded-full border border-slate-200 dark:border-slate-600">
                                                    {(() => {
                                                        const d = new Date(log.date);
                                                        return isNaN(d.getTime()) ? log.date : `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
                                                    })()}
                                                </span>
                                            </div>
                                            <div className="text-slate-400 dark:text-slate-500 transition-transform duration-300">
                                                {expandedLogIndex === index ? <ChevronUp size={20} /> : <ChevronDown size={20} />}
                                            </div>
                                        </button>
                                        {expandedLogIndex === index && (
                                            <div className="p-4 border-t border-slate-100 dark:border-slate-700 animate-[fadeIn_0.3s_ease-out]">
                                                <ul className="space-y-2">
                                                    {log.features.map((feature, fIndex) => (
                                                        <li key={fIndex} className="text-sm text-slate-600 dark:text-slate-400 flex items-start gap-2">
                                                            <span className="text-teal-500 dark:text-teal-400 mt-0.5">•</span>
                                                            <span>{feature}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                )) : (
                                    <div className="text-center py-8 text-slate-500 dark:text-slate-400">
                                        載入中或無更新紀錄...
                                    </div>
                                )}
                            </div>
                        )}
                    </Modal>

                    <Modal isOpen={showLinks} onClose={() => setShowLinks(false)} title="外部連結">
                        <div className="grid gap-3">
                            {socialLinksData.map(link => (
                                <a 
                                    key={link.id}
                                    href={link.url}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className={`flex items-center gap-4 p-4 rounded-xl border transition-all hover:shadow-md ${link.color}`}
                                >
                                    <div className="p-2 bg-white dark:bg-slate-800 rounded-full shadow-sm">
                                        {link.icon}
                                    </div>
                                    <span className="font-medium text-lg">{link.title}</span>
                                    <ExternalLink size={16} className="ml-auto opacity-50" />
                                </a>
                            ))}
                        </div>
                        <p className="text-center text-xs text-slate-400 dark:text-slate-500 mt-6">
                            常用藥學資料庫與網站
                        </p>
                    </Modal>

                    <Modal isOpen={showFeedback} onClose={() => !isSubmittingFeedback && setShowFeedback(false)} title="意見回饋">
                        {feedbackSuccess ? (
                            <div className="flex flex-col items-center justify-center py-10 text-teal-600 dark:text-teal-400 space-y-4 animate-[fadeIn_0.5s_ease-out]">
                                <CheckCircle size={48} />
                                <h4 className="text-xl font-bold text-slate-800 dark:text-slate-100">送出成功！</h4>
                                <p className="text-slate-500 dark:text-slate-400">感謝您的寶貴意見，我們會盡快處理。</p>
                            </div>
                        ) : (
                            <form onSubmit={handleFeedbackSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">回報類型</label>
                                    <div className="relative">
                                        <select 
                                            value={feedbackType}
                                            onChange={(e) => setFeedbackType(e.target.value)}
                                            className="appearance-none w-full pl-4 pr-10 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all cursor-pointer relative z-10"
                                        >
                                            <option value="工具新增許願">✨ 工具新增許願</option>
                                            <option value="功能錯誤回報">🐛 功能錯誤回報 (Bug)</option>
                                            <option value="資料內容修正">📝 資料內容修正</option>
                                            <option value="其他建議">💡 其他建議</option>
                                        </select>
                                        <div className="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none z-20 text-slate-500">
                                            <ChevronDown size={18} />
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">內容描述</label>
                                    <textarea 
                                        required
                                        rows="4"
                                        value={feedbackDesc}
                                        onChange={(e) => setFeedbackDesc(e.target.value)}
                                        placeholder="請詳細描述您的需求或遇到的問題..."
                                        className="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition-all resize-none"
                                    ></textarea>
                                </div>
                                <button 
                                    type="submit"
                                    disabled={isSubmittingFeedback || !feedbackDesc.trim()}
                                    className={`w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-xl font-medium transition-colors shadow-lg shadow-teal-200 dark:shadow-none flex items-center justify-center gap-2 ${(isSubmittingFeedback || !feedbackDesc.trim()) ? 'opacity-75 cursor-not-allowed' : ''}`}
                                >
                                    {isSubmittingFeedback ? '傳送中...' : '送出回饋'} {!isSubmittingFeedback && <Send size={18} />}
                                </button>
                            </form>
                        )}
                    </Modal>

                    {/* Hero Section */}
                    <div className="pt-32 pb-16 px-4 sm:px-6 lg:px-8 relative">
                        <div className="max-w-4xl mx-auto text-center relative z-10">
                            
                            <div className="flex justify-center mb-8 animate-[fadeIn_0.5s_ease-out]">
                                <div className="inline-flex items-center gap-3 bg-white/80 dark:bg-slate-800/80 backdrop-blur pl-2 pr-4 py-1.5 rounded-full shadow-sm border border-slate-200/60 dark:border-slate-700/60 ring-1 ring-slate-100 dark:ring-slate-800">
                                    <div className="relative">
                                        <span className="absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75 animate-ping"></span>
                                        <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-teal-500"></span>
                                    </div>
                                    <span className="text-sm font-semibold text-slate-600 dark:text-slate-300 tracking-wide">製作者：其仁藥師</span>
                                </div>
                            </div>

                            <h2 className="text-4xl md:text-6xl font-extrabold text-slate-800 dark:text-slate-100 mb-6 leading-tight tracking-tight animate-[fadeIn_0.7s_ease-out]">
                                結合<span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-600 inline-block">藥學專業</span>與<span className="text-transparent bg-clip-text bg-gradient-to-r from-teal-500 to-blue-600 dark:from-teal-400 dark:to-blue-500 inline-block">數位科技</span><br/>
                                提升醫療照護品質
                            </h2>

                            <p className="text-lg md:text-xl text-slate-600 dark:text-slate-400 mb-10 max-w-2xl mx-auto leading-relaxed animate-[fadeIn_0.9s_ease-out]">
                                專為臨床藥師打造的專業輔助中心。<br className="hidden md:block"/>
                                快速進行劑量計算、衛教諮詢與行政管理。
                            </p>
                            
                            {/* Search Bar */}
                            <div className="relative max-w-xl mx-auto animate-[fadeIn_1.1s_ease-out]" ref={searchRef}>
                                <div className="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 dark:text-slate-500">
                                    <Search size={22} />
                                </div>
                                <input
                                    ref={searchInputRef}
                                    type="text"
                                    className="block w-full pl-14 pr-16 py-5 rounded-2xl border-0 shadow-xl shadow-slate-200/60 dark:shadow-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-teal-500 text-lg text-slate-800 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 bg-white/90 dark:bg-slate-800/90 backdrop-blur transition-all focus:bg-white dark:focus:bg-slate-800 focus:shadow-2xl focus:shadow-teal-100/50 dark:focus:shadow-none"
                                    placeholder="搜尋名稱、適應症，或加上 #標籤..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                <div className="absolute inset-y-0 right-0 pr-5 flex items-center pointer-events-none text-slate-300 dark:text-slate-600">
                                    <kbd className="hidden sm:inline-block font-sans text-[10px] border border-slate-200 dark:border-slate-700 px-2 py-1 rounded-md bg-slate-50 dark:bg-slate-800/50">Ctrl K</kbd>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-24 flex-grow w-full z-10">
                        
                        <div className="flex flex-wrap justify-center gap-3 mb-12">
                            {dynamicCategories.map(cat => (
                                <button
                                    key={cat.id}
                                    onClick={() => setActiveCategory(cat.id)}
                                    className={`
                                        flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-200
                                        ${activeCategory === cat.id 
                                            ? 'bg-slate-800 dark:bg-teal-600 text-white shadow-lg shadow-slate-300 dark:shadow-none transform scale-105' 
                                            : 'bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 hover:border-slate-300 dark:hover:border-slate-600 hover:text-slate-700 dark:hover:text-slate-200 shadow-sm'}
                                    `}
                                >
                                    {cat.icon}
                                    {cat.name}
                                </button>
                            ))}
                        </div>

                        {/* App Grid */}
                        {currentApps.length > 0 ? (
                            <>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {currentApps.map(app => (
                                        <AppCard 
                                            key={app.id} 
                                            app={app} 
                                            onTrackClick={handleTrackClick}
                                            isBookmarked={bookmarks.includes(app.id)}
                                            onToggleBookmark={toggleBookmark}
                                            searchTerms={searchTerms}
                                            onTagClick={handleTagClick}
                                            isAdmin={isAdmin}
                                            dynamicCategories={dynamicCategories}
                                        />
                                    ))}
                                </div>
                                
                                {/* Pagination Controls */}
                                {totalPages > 1 && (
                                    <div className="flex justify-center items-center gap-2 mt-12">
                                        <button 
                                            onClick={() => setCurrentPage(1)}
                                            disabled={currentPage === 1}
                                            className="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                            title="第一頁"
                                        >
                                            <ChevronsLeft size={20} />
                                        </button>
                                        <button 
                                            onClick={() => setCurrentPage(Math.max(1, currentPage - 1))}
                                            disabled={currentPage === 1}
                                            className="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                            title="上一頁"
                                        >
                                            <ChevronLeft size={20} />
                                        </button>
                                        <span className="text-slate-600 dark:text-slate-400 font-medium px-4">
                                            第 {currentPage} 頁 / 共 {totalPages} 頁
                                        </span>
                                        <button 
                                            onClick={() => setCurrentPage(Math.min(totalPages, currentPage + 1))}
                                            disabled={currentPage === totalPages}
                                            className="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                            title="下一頁"
                                        >
                                            <ChevronRight size={20} />
                                        </button>
                                        <button 
                                            onClick={() => setCurrentPage(totalPages)}
                                            disabled={currentPage === totalPages}
                                            className="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                            title="最末頁"
                                        >
                                            <ChevronsRight size={20} />
                                        </button>
                                    </div>
                                )}
                            </>
                        ) : (
                            <div className="text-center py-20 bg-white/50 dark:bg-slate-800/50 backdrop-blur rounded-3xl border border-dashed border-slate-300 dark:border-slate-700">
                                <div className="inline-block p-6 rounded-full bg-slate-50 dark:bg-slate-800 text-slate-300 dark:text-slate-600 mb-4">
                                    <Search size={48} />
                                </div>
                                <h3 className="text-xl font-medium text-slate-900 dark:text-slate-100 mb-2">找不到相關工具</h3>
                                <p className="text-slate-500 dark:text-slate-400 mb-6">請嘗試使用不同的關鍵字或標籤進行搜尋。</p>
                                <button 
                                    onClick={() => {
                                        setSearchTerm("");
                                        setActiveCategory("all");
                                    }}
                                    className="px-6 py-2.5 bg-slate-800 dark:bg-teal-600 text-white font-medium rounded-xl hover:bg-teal-600 dark:hover:bg-teal-500 transition-colors shadow-md dark:shadow-none"
                                >
                                    清除搜尋條件
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 pt-12 pb-8 transition-colors duration-300">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                                <div className="text-center md:text-left">
                                    <div className="flex items-center justify-center md:justify-start gap-2 mb-2 text-slate-800 dark:text-slate-100 font-bold">
                                        <HeartPulse size={20} className="text-teal-600 dark:text-teal-400"/>
                                        Pharmacy Tools
                                    </div>
                                    <div className="flex flex-col items-center md:items-start gap-2">
                                        <p className="text-sm text-slate-500 dark:text-slate-400">
                                            &copy; {new Date().getFullYear()} Created by 其仁藥師.
                                        </p>
                                        {pageViews !== null && (
                                            <div className="text-xs font-bold text-teal-700 dark:text-teal-300 bg-teal-50/80 dark:bg-teal-900/30 px-3 py-1.5 rounded-full flex items-center gap-1.5 border border-teal-100 dark:border-teal-800 shadow-sm animate-[fadeIn_0.5s_ease-out]">
                                                <User size={14} /> 累積瀏覽人次: {pageViews}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                
                                <p className="text-xs text-slate-400 dark:text-slate-500 bg-slate-50 dark:bg-slate-800 px-4 py-2 rounded-lg border border-slate-100 dark:border-slate-700 text-center max-w-md">
                                    免責聲明：本網站工具僅供專業輔助參考，計算結果與臨床建議請務必經由專業醫療人員判斷後使用。
                                </p>

                                <div className="flex gap-4">
                                    <a href="#" className="p-2 text-slate-400 dark:text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-all">
                                        <span className="sr-only">GitHub</span>
                                        <Github size={20} />
                                    </a>
                                </div>
                            </div>
                        </div>
                    </footer>

                    {showBackToTop && (
                        <button
                            onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                            className="fixed bottom-8 right-8 p-3 bg-teal-600 dark:bg-teal-500 text-white rounded-full shadow-xl hover:bg-slate-800 dark:hover:bg-slate-700 transition-all transform hover:-translate-y-1 z-50 animate-[fadeIn_0.3s_ease-out]"
                            title="回到頂端"
                        >
                            <ArrowUp size={24} />
                        </button>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
